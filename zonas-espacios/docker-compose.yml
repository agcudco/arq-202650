version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_parkin
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: parkin_bd
      MYSQL_USER: parkin_user
      MYSQL_PASSWORD: parkin_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: